<!DOCTYPE html>
<html>
<head>
    <title>WaterPolo 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light container py-5">
    <h1 class="mb-4 text-center">Nouveau Match</h1>
    
    <div class="card p-4 shadow">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-5">
                    <label class="form-label">Équipe Domicile (Blanc)</label>
                    <select name="equipe_domicile" class="form-select">
                        {% for eq in equipes %}
                        <option value="{{ eq.id }}">{{ eq.nom }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="col-md-2 text-center d-flex align-items-center justify-content-center">
                    <h3>VS</h3>
                </div>

                <div class="col-md-5">
                    <label class="form-label">Équipe Extérieur (Bleu)</label>
                    <select name="equipe_exterieur" class="form-select">
                        {% for eq in equipes %}
                        <option value="{{ eq.id }}">{{ eq.nom }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mt-4">
                <label class="form-label">Règlement</label>
                <select name="config" class="form-select">
                    {% for conf in configs %}
                    <option value="{{ conf.id }}">{{ conf.nom }} ({{ conf.temps_possession }}s)</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-4 btn-lg">COMMENCER LE MATCH</button>
        </form>
    </div>
</body>
</html>
